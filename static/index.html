<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Intelligence Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .chat-container {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 1rem 1.5rem;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .response-area {
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        .sql-box {
            background: #000;
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin: 1rem 0;
            position: relative;
            font-family: 'Courier New', Courier, monospace;
            border-left: 4px solid var(--primary);
            overflow-x: auto;
        }

        .answer-box {
            line-height: 1.6;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: #e2e8f0;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(15, 23, 42, 0.3);
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SQL Intelligence Hub</h1>
            <p class="subtitle">Ask your database anything in natural language</p>
        </header>

        <div class="chat-container">
            <div class="input-group">
                <input type="text" id="queryInput" placeholder="e.g. Find top 5 expensive shoes from Nike...">
                <button id="sendBtn">Execute</button>
            </div>

            <div class="loading" id="loader">
                <div class="spinner"></div>
                <p>Analyzing, generating, and running your query...</p>
            </div>

            <div class="error-message" id="errorMsg"></div>

            <div class="response-area" id="responseArea">
                <h3>Natural Language Answer</h3>
                <div class="answer-box" id="answer"></div>

                <h3>Generated SQL</h3>
                <div class="sql-box">
                    <code id="sqlCode"></code>
                </div>

                <h3>Data Results</h3>
                <div class="table-container">
                    <table id="resultsTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const queryInput = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');
        const loader = document.getElementById('loader');
        const responseArea = document.getElementById('responseArea');
        const errorMsg = document.getElementById('errorMsg');
        
        let sessionId = null;

        async function executeQuery() {
            const query = queryInput.value.trim();
            if (!query) return;

            // Reset UI
            errorMsg.style.display = 'none';
            responseArea.style.display = 'none';
            loader.style.display = 'block';
            sendBtn.disabled = true;

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, session_id: sessionId })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Something went wrong');
                }

                sessionId = data.session_id;
                
                // Display Answer
                document.getElementById('answer').innerText = data.answer;
                document.getElementById('sqlCode').innerText = data.sql;

                // Display Table
                const head = document.getElementById('tableHead');
                const body = document.getElementById('tableBody');
                head.innerHTML = '';
                body.innerHTML = '';

                if (data.results && data.results.length > 0) {
                    const columns = Object.keys(data.results[0]);
                    
                    const headerRow = document.createElement('tr');
                    columns.forEach(col => {
                        const th = document.createElement('th');
                        th.innerText = col;
                        headerRow.appendChild(th);
                    });
                    head.appendChild(headerRow);

                    data.results.forEach(row => {
                        const tr = document.createElement('tr');
                        columns.forEach(col => {
                            const td = document.createElement('td');
                            td.innerText = row[col];
                            tr.appendChild(td);
                        });
                        body.appendChild(tr);
                    });
                } else {
                    body.innerHTML = '<tr><td colspan="100%" style="text-align:center">No data found</td></tr>';
                }

                responseArea.style.display = 'block';

            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', executeQuery);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeQuery();
        });
    </script>
</body>
</html>
